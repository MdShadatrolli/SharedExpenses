<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.style.transition = 'transform 0.2s ease-out';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple form submission animation
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                loginBtn.innerHTML = 'Sign in to SplitFlow';
            }, 1500);
        });
    </script>
