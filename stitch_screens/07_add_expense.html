<script>
        document.addEventListener('DOMContentLoaded', () => {
            const splitBtns = document.querySelectorAll('.split-btn');
            const dynamicLabel = document.getElementById('dynamicLabel');
            const dynamicInputs = document.querySelectorAll('.dynamic-input input');
            const equalDisplays = document.querySelectorAll('.equal-display');
            const modalOverlay = document.getElementById('modalOverlay');
            const closeModal = document.getElementById('closeModal');
            const cancelBtn = document.getElementById('cancelBtn');

            const updateSplitMode = (type) => {
                splitBtns.forEach(btn => {
                    if(btn.dataset.type === type) {
                        btn.classList.add('bg-primary', 'text-on-primary', 'font-semibold');
                        btn.classList.remove('text-on-surface-variant');
                    } else {
                        btn.classList.remove('bg-primary', 'text-on-primary', 'font-semibold');
                        btn.classList.add('text-on-surface-variant');
                    }
                });

                switch(type) {
                    case 'equal':
                        dynamicLabel.textContent = 'Split (%)';
                        equalDisplays.forEach(el => el.classList.remove('hidden'));
                        dynamicInputs.forEach(el => el.classList.add('hidden'));
                        break;
                    case 'exact':
                        dynamicLabel.textContent = 'Amount ($)';
                        equalDisplays.forEach(el => el.classList.add('hidden'));
                        dynamicInputs.forEach(el => {
                            el.classList.remove('hidden');
                            el.placeholder = '0.00';
                        });
                        break;
                    case 'percent':
                        dynamicLabel.textContent = 'Percent (%)';
                        equalDisplays.forEach(el => el.classList.add('hidden'));
                        dynamicInputs.forEach(el => {
                            el.classList.remove('hidden');
                            el.placeholder = '0%';
                        });
                        break;
                    case 'shares':
                        dynamicLabel.textContent = 'Shares';
                        equalDisplays.forEach(el => el.classList.add('hidden'));
                        dynamicInputs.forEach(el => {
                            el.classList.remove('hidden');
                            el.placeholder = '1';
                        });
                        break;
                }
            };

            splitBtns.forEach(btn => {
                btn.addEventListener('click', () => updateSplitMode(btn.dataset.type));
            });

            // Basic modal close interaction
            const dismissModal = () => {
                modalOverlay.classList.add('opacity-0', 'pointer-events-none');
                modalOverlay.querySelector('.bg-surface-container-lowest').classList.add('scale-95');
                setTimeout(() => {
                    modalOverlay.style.display = 'none';
                }, 300);
            };

            closeModal.addEventListener('click', dismissModal);
            cancelBtn.addEventListener('click', dismissModal);
            
            // Submission handler
            document.getElementById('expenseForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = e.target.closest('form').nextElementSibling.querySelector('button[type="submit"]');
                btn.innerHTML = '<span>Saving...</span><span class="material-symbols-outlined animate-spin" data-icon="refresh">refresh</span>';
                setTimeout(() => {
                    dismissModal();
                }, 1000);
            });
        });
    </script>
